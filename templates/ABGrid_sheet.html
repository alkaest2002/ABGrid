
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <style>
      * {
        margin: 0;
        padding: 0;
        font-size: 1em;
        font-family: Arial, Helvetica, sans-serif;
        box-sizing: border-box
      }

      html {
        font-size: 12pt;
      }
    </style>
    <style>
    	@page {
    		width: 210mm;
		    height: 297mm;
        padding: 0;
        margin: 20mm;
        page-break-after: always;
      }
    	
      @font-face {
          font-family: 'omrregular';
          src: url('omrbubbles-webfont.woff2') format('woff2'),
              url('omrbubbles-webfont.woff') format('woff');
          font-weight: normal;
          font-style: normal;

      }
      
      @font-face {
          font-family: '3_of_9_barcoderegular';
          src: url('3of9_new-webfont.woff2') format('woff2'),
              url('3of9_new-webfont.woff') format('woff');
          font-weight: normal;
          font-style: normal;

      }

      .bubble span {
        display: inline-block;
        margin-right: 5px;
        font-family: "omrregular";
      }

      .barcode {
        font-family: "3_of_9_barcoderegular";
      }

    </style>
  </head>
  <body>
    <div class="page">
      <div class="intro">
        <h1><b>AB</b>-GRID</h1>
      </div>
      <div class="bubble">
        <span>A</span>
      </div>
      <div>
        <span class="barcode">{{ barcode }}</span>
      </div>
    </div>
  </body>
</html>
