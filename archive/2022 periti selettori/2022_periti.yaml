consegna: "Pensa alla prova cha hai appena svolto e rispondi alle seguenti domande."
domandaA: "Chi vorresti insieme a te in un gruppo di lavoro reale?"
domandaA_scelte: "Indica da un minimo di 1 persona a un massimo di 2 persone, annerendo per intero la lettera corrispondente (non puoi indicare te stesso!)"
